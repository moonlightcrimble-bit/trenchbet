<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRENCHBET</title>

  <link rel="icon" type="image/png" href="trenchbet.png">
  
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 40px 20px;
      font-family: 'Press Start 2P', monospace;
    }
    .logo { font-size: 52px; letter-spacing: 4px; }
    .logo .trench { color: #ffffff; }
    .logo .bet { color: #8b2be2; }
    .timer {
      font-size: 40px;
      color: #8b2be2;
      letter-spacing: 2px;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 18px #7b1fd688, 0 0 4px #7b1fd6aa;
    }
    .ca-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .ca-label { font-size: 10px; color: #9b3df0aa; letter-spacing: 2px; }
    .ca-box {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #0d0d0d;
      border: 1px solid #8b2be255;
      border-radius: 6px;
      padding: 12px 16px;
    }
    .ca-text {
      font-size: 9px;
      color: #cc88ff;
      letter-spacing: 1px;
      word-break: break-all;
      max-width: 340px;
    }
    .copy-btn {
      background: #8b2be2;
      border: none;
      border-radius: 4px;
      padding: 8px 12px;
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .copy-btn:hover { background: #a044f5; }
    .copy-btn.copied { background: #2be28b; color: #000; }
    .footer {
      font-size: 10px;
      color: #6a1ab077;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .footer a { color: #9b3df0aa; text-decoration: none; transition: color 0.2s; }
    .footer a:hover { color: #b060ff; }
    .x-icon { width: 13px; height: 13px; fill: #9b3df0aa; vertical-align: middle; }
  </style>
</head>
<body>

  <div class="logo">
    <span class="trench">TRENCH</span><span class="bet">BET</span>
  </div>

  <div class="timer" id="timer">07:00:00:00</div>

  <div class="ca-wrapper">
    <div class="ca-label">CA:</div>
    <div class="ca-box">
      <div class="ca-text" id="ca-address">-----</div>
      <button class="copy-btn" id="copy-btn" onclick="copyCA()">COPY</button>
    </div>
  </div>

  <div class="footer">
    <svg class="x-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.742l7.73-8.835L1.254 2.25H8.08l4.253 5.622L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/>
    </svg>
    <a href="https://x.com/trenchbetdotxyz" target="_blank" rel="noopener">Follow @trenchbetdotxyz for more updates </a> 
  </div>

  <script>
    // =====================================================
    // DEADLINE — set this to exactly 7 days from when
    // you first upload/host this page.
    // Format: new Date('YYYY-MM-DDTHH:MM:SS') in UTC
    //
    // RIGHT NOW it is set to: May 27, 2026 at 12:00:00 UTC
    // (7 days from May 20, 2026)
    // Change this date whenever you re-deploy.
    // =====================================================
    var DEADLINE = new Date('2026-05-27T12:00:00Z').getTime();

    function pad(n) {
      return ('0' + Math.max(0, Math.floor(n))).slice(-2);
    }

    function updateTimer() {
      var remaining = DEADLINE - Date.now();
      if (remaining <= 0) {
        document.getElementById('timer').textContent = '00:00:00:00';
        return;
      }
      var days    = Math.floor(remaining / 86400000);
      var hours   = Math.floor((remaining % 86400000) / 3600000);
      var minutes = Math.floor((remaining % 3600000)  / 60000);
      var seconds = Math.floor((remaining % 60000)    / 1000);

      document.getElementById('timer').textContent =
        pad(days) + ':' + pad(hours) + ':' + pad(minutes) + ':' + pad(seconds);
    }

    updateTimer();
    setInterval(updateTimer, 1000);

    function copyCA() {
      var ca = document.getElementById('ca-address').textContent.trim();
      navigator.clipboard.writeText(ca).then(function() {
        var btn = document.getElementById('copy-btn');
        btn.textContent = 'COPIED!';
        btn.classList.add('copied');
        setTimeout(function() {
          btn.textContent = 'COPY';
          btn.classList.remove('copied');
        }, 2000);
      });
    }
  </script>

</body>
</html>
