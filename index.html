<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRENCHBET</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 40px 20px;
      font-family: 'Press Start 2P', monospace;
    }
    .logo { font-size: 48px; letter-spacing: 4px; }
    .logo .trench { color: #ffffff; }
    .logo .bet { color: #8b2be2; }
    .subtitle { font-size: 11px; color: #8b2be2; letter-spacing: 2px; text-align: center; line-height: 2; }
    .timer {
      font-size: 48px;
      color: #8b2be2;
      letter-spacing: 4px;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 20px #8b2be299, 0 0 6px #8b2be2bb;
    }
    .ca-wrapper { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .ca-label { font-size: 10px; color: #8b2be2; letter-spacing: 2px; }
    .ca-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0a0a0a;
      border: 1px solid #8b2be266;
      border-radius: 6px;
      padding: 12px 14px;
      max-width: 520px;
      width: 100%;
    }
    .ca-text { font-size: 8px; color: #cc88ff; letter-spacing: 1px; word-break: break-all; flex: 1; line-height: 1.8; }
    .copy-btn {
      background: #8b2be2;
      border: none;
      border-radius: 4px;
      padding: 10px 14px;
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .copy-btn:hover { background: #a044f5; }
    .copy-btn.copied { background: #2be28b; color: #000; }
    .footer { font-size: 9px; color: #8b2be299; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; text-align: center; }
    .footer a { color: #8b2be2bb; text-decoration: none; transition: color 0.2s; }
    .footer a:hover { color: #b060ff; }
    .x-icon { width: 12px; height: 12px; fill: #8b2be2bb; vertical-align: middle; flex-shrink: 0; }
    .done-msg { font-size: 14px; color: #2be28b; text-align: center; letter-spacing: 2px; line-height: 2; display: none; }
  </style>
</head>
<body>

  <div class="logo"><span class="trench">TRENCH</span><span class="bet">BET</span></div>

  <div class="subtitle" id="subtitle">TRENCHBET WILL BE LIVE IN</div>
  <div class="done-msg" id="done-msg">🎰 TRENCHBET IS NOW LIVE! 🎰</div>

  <div class="timer" id="timer">00:40:00</div>

  <div class="ca-wrapper">
    <div class="ca-label">CA:</div>
    <div class="ca-box">
      <div class="ca-text" id="ca-address">F7go45k4BevPJ5AtSwugLuMXcXViSarixCpf0gm6BLNK</div>
      <button class="copy-btn" id="copy-btn" onclick="copyCA()">COPY</button>
    </div>
  </div>

  <div class="footer">
    <svg class="x-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.742l7.73-8.835L1.254 2.25H8.08l4.253 5.622L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/>
    </svg>
    <span>Follow <a href="https://x.com/trenchbet_sol" target="_blank" rel="noopener">@trenchbet_sol</a> for more updates!</span>
  </div>

  <script>
    // ✅ HARDCODED deadline — same for every browser, every device, every person
    // This is exactly 40 minutes from when this file was generated.
    // To reset: change this number to Date.now() + (40 * 60 * 1000) and re-save.
    var DEADLINE = 1779660450651;

    function pad(n) {
      return ('0' + Math.max(0, Math.floor(n))).slice(-2);
    }

    function updateTimer() {
      var remaining = DEADLINE - Date.now();
      if (remaining <= 0) {
        document.getElementById('timer').textContent = '00:00:00';
        document.getElementById('subtitle').style.display = 'none';
        document.getElementById('done-msg').style.display = 'block';
        return;
      }
      var hours   = Math.floor(remaining / 3600000);
      var minutes = Math.floor((remaining % 3600000) / 60000);
      var seconds = Math.floor((remaining % 60000) / 1000);
      document.getElementById('timer').textContent =
        pad(hours) + ':' + pad(minutes) + ':' + pad(seconds);
    }

    updateTimer();
    setInterval(updateTimer, 1000);

    function copyCA() {
      var ca = document.getElementById('ca-address').textContent.trim();
      navigator.clipboard.writeText(ca).then(function() {
        var btn = document.getElementById('copy-btn');
        btn.textContent = 'COPIED!';
        btn.classList.add('copied');
        setTimeout(function() {
          btn.textContent = 'COPY';
          btn.classList.remove('copied');
        }, 2000);
      });
    }
  </script>

</body>
</html>
